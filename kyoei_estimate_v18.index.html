
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;font-size:14px;color:#222;background:#f0f0ec}
.app{min-height:600px}
.topbar{background:#1a3a6b;padding:10px 18px;display:flex;align-items:center;justify-content:space-between}
.topbar-title{font-size:15px;font-weight:500;color:#fff;display:flex;align-items:center;gap:8px;letter-spacing:.03em}
.saved-badge{font-size:11px;color:#7ecfa0;display:flex;align-items:center;gap:4px;opacity:0;transition:opacity .4s}
.saved-badge.show{opacity:1}
.nav-tabs{background:#1d4480;display:flex;gap:0;padding:0 10px}
.tab{padding:10px 18px;font-size:13px;cursor:pointer;border-bottom:3px solid transparent;color:rgba(255,255,255,.65);transition:all .18s;white-space:nowrap;letter-spacing:.02em}
.tab.active{color:#fff;border-bottom-color:#f0c040}
.tab:hover:not(.active){color:#fff;background:rgba(255,255,255,.08)}
.content{padding:16px}
.card{background:#fff;border:1px solid #c8d4e8;border-radius:10px;padding:0;margin-bottom:16px;box-shadow:0 2px 8px rgba(26,58,107,.07);overflow:hidden}
.card-head{display:flex;align-items:center;gap:9px;font-size:13px;font-weight:600;color:#fff;background:linear-gradient(90deg,#1a3a6b 0%,#2a5298 100%);padding:10px 16px;letter-spacing:.04em}
.card-head i{font-size:16px;opacity:.9}
.card-body{padding:18px 18px 14px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.form-group{display:flex;flex-direction:column;gap:0}
.form-group.full{grid-column:1/-1}
label{font-size:11px;color:#fff;font-weight:600;letter-spacing:.06em;background:#3a6abf;display:inline-block;padding:3px 10px 3px 10px;border-radius:4px 4px 0 0;width:fit-content;margin-bottom:0;line-height:1.6}
input[type=text],input[type=number],input[type=date],select,textarea{width:100%;padding:8px 11px;font-size:13px;border:2px solid #b8c8e0;border-radius:0 6px 6px 6px;background:#f8fafd;color:#1a2a44;font-family:inherit;transition:border-color .15s,background .15s;line-height:1.5}
textarea{resize:vertical;min-height:60px}
input:focus,select:focus,textarea:focus{outline:none;border-color:#1a3a6b;background:#fff;box-shadow:0 0 0 3px rgba(26,58,107,.1)}
.btn{padding:7px 16px;font-size:13px;border-radius:6px;cursor:pointer;border:1px solid #c8d4e0;background:#fff;color:#333;display:inline-flex;align-items:center;gap:6px;font-family:inherit;transition:all .15s;font-weight:500}
.btn:hover{background:#f0f4f9;border-color:#1a3a6b}
.btn.primary{background:#1a3a6b;color:#fff;border-color:#1a3a6b}
.btn.primary:hover{background:#0f2550}
.btn.pdf{background:#c0392b;color:#fff;border-color:#c0392b}
.btn.pdf:hover{background:#a93226}
.btn.danger{color:#c0392b;border-color:transparent;background:transparent}
.btn.danger:hover{background:#fdf0ef}
.btn.sm{padding:4px 10px;font-size:11px}

/* New type selector buttons */
.type-select-area{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:8px}
.type-btn-big{background:#fff;border:2px solid #c8d4e0;border-radius:12px;padding:22px 12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:10px;transition:all .2s;font-family:inherit}
.type-btn-big:hover{border-color:#1a3a6b;background:#f0f4fc;transform:translateY(-2px);box-shadow:0 4px 12px rgba(26,58,107,.12)}
.type-btn-big .icon{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px}
.type-btn-big .label{font-size:14px;font-weight:500;color:#1a3a6b}
.type-btn-big .desc{font-size:11px;color:#888;text-align:center;line-height:1.5}
.type-btn-big.shio .icon{background:#e8f0fa;color:#1a3a6b}
.type-btn-big.nai .icon{background:#e8f5ee;color:#1b6b3a}
.type-btn-big.kaisou .icon{background:#fdf0e8;color:#6b3a1a}
.type-btn-big.shio{border-color:#b5cce8}
.type-btn-big.nai{border-color:#a0d4b5}
.type-btn-big.kaisou{border-color:#e0b88a}

.item-table{width:100%;border-collapse:collapse;font-size:13px}
.item-table thead tr{background:#1a3a6b}
.item-table th{padding:8px 8px;text-align:left;font-weight:500;font-size:12px;color:#fff;border:1px solid #1a3a6b}
.item-table tbody tr:nth-child(even){background:#f5f8fc}
.item-table tbody tr:hover{background:#eaf0fa}
.item-table td{padding:4px 4px;border:1px solid #9fb3cc;vertical-align:middle;background:#fff}
.item-table tbody tr:nth-child(even) td{background:#f5f8fc}
.item-table input{border:2px solid #b8c8e0;background:#f8fafd;width:100%;padding:5px 7px;font-size:13px;color:#1a2a44;font-family:inherit;border-radius:4px}
.item-table input:focus{background:#fff;border-color:#1a3a6b;outline:none;box-shadow:0 0 0 2px rgba(26,58,107,.12)}
.total-wrap{display:flex;justify-content:flex-end;margin-top:12px}
.total-box{background:#1a3a6b;border-radius:8px;padding:12px 20px;min-width:220px}
.total-row{display:flex;justify-content:space-between;gap:24px;padding:3px 0;font-size:13px;color:rgba(255,255,255,.8)}
.total-row.grand{font-size:16px;font-weight:500;border-top:1px solid rgba(255,255,255,.3);margin-top:6px;padding-top:8px;color:#f0c040}
.list-panel{display:flex;flex-direction:column;gap:8px}
.est-card{background:#fff;border:1px solid #d4dce8;border-radius:8px;padding:13px 15px;cursor:pointer;transition:all .18s;display:flex;justify-content:space-between;align-items:center}
.est-card:hover{border-color:#1a3a6b;box-shadow:0 2px 8px rgba(26,58,107,.1)}
.est-card.sel{border-color:#1a3a6b;border-width:2px;background:#f0f4fc}
.badge{font-size:11px;padding:3px 10px;border-radius:99px;font-weight:600;letter-spacing:.03em;display:inline-flex;align-items:center;gap:3px}
.b-shio{background:#dce8f8;color:#1a3a6b;border:1px solid #b5cce8}
.b-nai{background:#d8f0e3;color:#1b6b3a;border:1px solid #8dd4ab}
.b-kaisou{background:#fde8d0;color:#8a3a00;border:1px solid #e0aa70}
.empty{text-align:center;padding:48px 20px;color:#888}
.empty i{font-size:36px;display:block;margin-bottom:10px;opacity:.3}
.pdf-preview{background:#fff;border:1px solid #ddd;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.08)}

#addReceivedModal{display:none}
@media print{
  body{background:#fff!important;margin:0!important;padding:0!important}
  .app,.content{padding:0!important}
  .topbar,.nav-tabs,.no-print{display:none!important}
  .print-doc{display:block!important;margin:0;padding:0}
  .print-doc-inner{box-shadow:none!important;border:none!important}
  @page{size:A4 portrait;margin:0}
  #printArea{
    position:fixed;top:0;left:0;
    width:210mm;height:297mm;
    overflow:hidden;
    background:#fff;
  }
}
.print-doc{display:none}
.print-doc-inner{background:#fff;padding:56px 62px;box-sizing:border-box}

/* PDF layout */
.doc-title-center{text-align:center;font-size:22pt;font-weight:500;letter-spacing:.25em;padding:14px 0 10px;border-bottom:3px double #1a3a6b;margin-bottom:14px;color:#1a3a6b}
.doc-no-row{display:flex;justify-content:flex-end;gap:20px;font-size:11px;color:#555;margin-bottom:10px}
.doc-no-row span{font-weight:500;color:#222}
.doc-party{display:grid;grid-template-columns:1fr 1fr;gap:0;border:1.5px solid #1a3a6b;margin-bottom:0}
.party-left{padding:14px 18px;border-right:1.5px solid #1a3a6b}
.party-right{padding:14px 18px;background:#f0f4fc;display:flex;flex-direction:column;gap:0}
.party-label{font-size:9px;color:#5a6a82;letter-spacing:.05em;margin-bottom:4px;font-weight:500;text-transform:uppercase}
.customer-name{font-size:16pt;font-weight:500;border-bottom:1.5px solid #1a3a6b;padding-bottom:6px;margin-bottom:8px}
.greeting{font-size:10px;color:#444;line-height:1.9}
.company-name{font-size:13pt;font-weight:500;color:#1a3a6b}
.company-sub{font-size:9px;color:#555;line-height:2;margin-top:3px;margin-bottom:10px}
.stamp-row{display:grid;grid-template-columns:1fr 1fr 1fr;border-top:1px solid #bcd;margin-top:4px}
.stamp-cell{text-align:center;padding:4px 0;font-size:9px;color:#5a6a82;border-right:1px solid #bcd}
.stamp-cell:last-child{border-right:none}
.stamp-box{height:32px;border-top:1px solid #bcd;margin-top:2px;font-size:12px;color:#333;display:flex;align-items:center;justify-content:center}
.conditions-band{background:#f0f4fc;border:1.5px solid #1a3a6b;border-top:none;padding:10px 18px;display:grid;grid-template-columns:1fr 1fr;gap:4px 30px}
.cond-row{display:flex;gap:8px;font-size:11px;padding:3px 0;border-bottom:.5px solid rgba(26,58,107,.15)}
.cond-key{color:#1a3a6b;font-weight:500;min-width:82px;flex-shrink:0}
.cond-val{color:#333}
.items-section{margin-top:14px}
.items-title{background:#1a3a6b;color:#fff;font-size:11px;font-weight:500;padding:5px 12px;letter-spacing:.05em}
.items-table{width:100%;border-collapse:collapse;font-size:11px}
.items-table th{background:#2d5aa0;color:#fff;padding:7px 10px;text-align:left;border:1px solid #1a3a6b;font-weight:500}
.items-table th.right{text-align:right}
.items-table td{padding:7px 10px;border:1px solid #c8d4e8}
.items-table td.right{text-align:right}
.items-table tr:nth-child(even) td{background:#f5f8fc}
.total-section{border:1.5px solid #1a3a6b;border-top:none}
.total-inner{display:flex;justify-content:flex-end;padding:10px 18px}
.total-grid{display:grid;grid-template-columns:130px 120px;font-size:11px}
.total-grid .tk{color:#1a3a6b;font-weight:500;padding:3px 0;border-bottom:.5px solid #c8d4e8}
.total-grid .tv{text-align:right;padding:3px 0;border-bottom:.5px solid #c8d4e8}
.total-grid .grand-k{font-size:14px;font-weight:500;color:#1a3a6b;padding:6px 0 2px;border-bottom:none}
.total-grid .grand-v{font-size:14px;font-weight:500;color:#1a3a6b;text-align:right;padding:6px 6px 2px;border-bottom:none;background:#f0f4fc}
.remarks-section{margin-top:12px;padding:10px 14px;background:#fffdf0;border:1px solid #e0d08a;border-radius:4px;font-size:10px;color:#555;line-height:1.8}
.kaisou-section{margin-top:12px;border:1.5px solid #1a3a6b}
.kaisou-section-title{background:#1a3a6b;color:#fff;font-size:11px;font-weight:500;padding:5px 12px}
.kaisou-row{display:flex;gap:0;border-bottom:1px solid #c8d4e8;font-size:11px}
.kaisou-row:last-child{border-bottom:none}
.kaisou-key{background:#f0f4fc;color:#1a3a6b;font-weight:500;width:110px;padding:7px 10px;border-right:1.5px solid #c8d4e8;border-bottom:1px solid #c8d4e8;vertical-align:top}
.kaisou-val{padding:7px 10px;color:#333;line-height:1.7;border-bottom:1px solid #c8d4e8;vertical-align:top}
.kaisou-section table tr:last-child .kaisou-key,
.kaisou-section table tr:last-child .kaisou-val{border-bottom:none}

/* ── レスポンシブ対応 ── */
@media(max-width:640px){
  /* ナビタブ：折り返し許可 */
  .nav-tabs{flex-wrap:wrap;padding:0 4px}
  .tab{padding:8px 10px;font-size:12px}

  /* コンテンツの余白を縮小 */
  .content{padding:10px 8px}

  /* カード内パディング縮小 */
  .card-body{padding:12px 10px 10px}

  /* 2列グリッド→1列 */
  .form-grid{grid-template-columns:1fr}
  /* 3列グリッド→1列 */
  .form-grid-3{grid-template-columns:1fr}

  /* 種別選択ボタン：縦並び */
  .type-select-area{grid-template-columns:1fr}

  /* 品目テーブル：横スクロール */
  .item-table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .item-table{min-width:520px}

  /* 合計ボックス：全幅 */
  .total-wrap{justify-content:stretch}
  .total-box{min-width:unset;width:100%}

  /* 見積カード：縦並び */
  .est-card{flex-direction:column;align-items:flex-start;gap:10px}
  .est-card > div:last-child{width:100%;flex-direction:row;flex-wrap:wrap;justify-content:flex-end}

  /* 受領書・納品書の2カラム→1カラム */
  .doc-split{grid-template-columns:1fr !important}
  .doc-split-list{max-height:200px !important}
}

<!-- ログイン画面 -->
<div id="loginScreen" style="display:flex;position:fixed;inset:0;background:linear-gradient(135deg,#0f2550 0%,#1a3a6b 50%,#2a5298 100%);z-index:9999;align-items:center;justify-content:center">
  <div style="background:#fff;border-radius:16px;padding:40px 36px;width:360px;max-width:92vw;box-shadow:0 16px 48px rgba(0,0,0,.3)">
    <div style="text-align:center;margin-bottom:28px">
      <div style="font-size:22px;font-weight:600;color:#1a3a6b;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:4px"><i class="ti ti-building-store"></i>共栄商事</div>
      <div style="font-size:13px;color:#5a6a82">見積管理システム</div>
    </div>
    <div style="margin-bottom:14px">
      <label style="font-size:11px;color:#fff;font-weight:600;letter-spacing:.06em;background:#3a6abf;display:inline-block;padding:3px 10px;border-radius:4px 4px 0 0">メールアドレス（ID）</label>
      <input type="text" id="loginId" placeholder="例：yamada@kyoeishoji.co.jp" style="width:100%;padding:8px 11px;font-size:13px;border:2px solid #b8c8e0;border-radius:0 6px 6px 6px;background:#f8fafd;color:#1a2a44;font-family:inherit" onkeydown="if(event.key==='Enter')document.getElementById('loginPw').focus()">
    </div>
    <div style="margin-bottom:18px">
      <label style="font-size:11px;color:#fff;font-weight:600;letter-spacing:.06em;background:#3a6abf;display:inline-block;padding:3px 10px;border-radius:4px 4px 0 0">パスワード</label>
      <input type="password" id="loginPw" placeholder="パスワードを入力" style="width:100%;padding:8px 11px;font-size:13px;border:2px solid #b8c8e0;border-radius:0 6px 6px 6px;background:#f8fafd;color:#1a2a44;font-family:inherit" onkeydown="if(event.key==='Enter')doLogin()">
    </div>

    <button onclick="doLogin()" style="width:100%;padding:11px;background:#1a3a6b;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px"><i class="ti ti-login"></i>ログイン</button>

  <div class="topbar no-print">
    <div class="topbar-title"><i class="ti ti-building-store" style="font-size:18px"></i>共栄商事　見積管理システム</div>

      <button onclick="logout()" style="font-size:11px;padding:4px 10px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:6px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:4px"><i class="ti ti-logout" style="font-size:12px"></i>ログアウト</button>

<script>
const CO={name:'共栄商事株式会社',addr:'福岡県北九州市小倉北区西港町111-2',tel:'TEL 093(581)5688　FAX 093(581)5013'};
let S={tab:'list',estimates:[],editData:null,selIdx:null,readOnly:false,receivedEstimates:[],searchRQ:''};

// ── 認証 ──────────────────────────────────────────────────────
const ADMIN_ID='sasaki-t@kyoeishoji.co.jp';
const ADMIN_PW='S2582t3254';
let AUTH={loggedIn:false,currentUser:null,isAdmin:false};

function loadUsers(){
  try{const u=localStorage.getItem('kyoei_users');return u?JSON.parse(u):[];}catch(e){return[];}
}
function saveUsers(users){
  try{localStorage.setItem('kyoei_users',JSON.stringify(users));}catch(e){}
}
function getUsers(){return loadUsers();}

function tryLogin(id,pw){
  if(id===ADMIN_ID&&pw===ADMIN_PW){
    AUTH={loggedIn:true,currentUser:{id:ADMIN_ID,name:'管理者（佐々木 拓也）'},isAdmin:true};
    return true;
  }
  const users=loadUsers();
  const u=users.find(u=>u.id===id&&u.pw===pw);
  if(u){
    AUTH={loggedIn:true,currentUser:u,isAdmin:false};
    return true;
  }
  return false;
}
function logout(){
  AUTH={loggedIn:false,currentUser:null,isAdmin:false};
  showLogin();
}

function showLogin(){
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('loginErr').textContent='';
  document.getElementById('loginId').value='';
  document.getElementById('loginPw').value='';
}
function hideLogin(){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('app').style.display='';
}
function doLogin(){
  const id=document.getElementById('loginId').value.trim();
  const pw=document.getElementById('loginPw').value;
  if(!id||!pw){document.getElementById('loginErr').textContent='IDとパスワードを入力してください';return;}
  if(tryLogin(id,pw)){
    hideLogin();
    // ヘッダーにユーザー名表示
    document.getElementById('userLabel').textContent=AUTH.currentUser.name||AUTH.currentUser.id;
    document.getElementById('adminTabWrap').style.display=AUTH.isAdmin?'':'none';
    ld();render();
  }else{
    document.getElementById('loginErr').textContent='IDまたはパスワードが正しくありません';
  }
}

// ── 管理者画面 ──────────────────────────────────────────────
function renderAdmin(){
  const users=getUsers();
  const rows=users.length?users.map((u,i)=>`
    <tr>
      <td style="padding:8px 12px;border-bottom:1px solid #e0e8f4">${u.id}</td>
      <td style="padding:8px 12px;border-bottom:1px solid #e0e8f4">${u.name||'―'}</td>
      <td style="padding:8px 12px;border-bottom:1px solid #e0e8f4;text-align:center">
        <button class="btn sm danger" onclick="delUser(${i})"><i class="ti ti-trash"></i>削除</button>
        <button class="btn sm" onclick="resetPwPrompt(${i})" style="margin-left:4px"><i class="ti ti-key"></i>PW変更</button>
      </td>
    </tr>`).join('')
  :'<tr><td colspan="3" style="padding:20px;text-align:center;color:#aaa">ユーザーがいません</td></tr>';

  return`<div style="max-width:680px;margin:0 auto">
    <div class="card">
      <div class="card-head"><i class="ti ti-users"></i>ユーザー管理</div>
      <div class="card-body">
        <table style="width:100%;border-collapse:collapse;font-size:13px">
          <thead><tr style="background:#f0f4fc">
            <th style="padding:8px 12px;text-align:left;color:#1a3a6b;font-weight:600;border-bottom:2px solid #c8d4e8">メールアドレス（ID）</th>
            <th style="padding:8px 12px;text-align:left;color:#1a3a6b;font-weight:600;border-bottom:2px solid #c8d4e8">氏名</th>
            <th style="padding:8px 12px;text-align:center;color:#1a3a6b;font-weight:600;border-bottom:2px solid #c8d4e8">操作</th>
          </tr></thead>
          <tbody>${rows}</tbody>

function doChangePw(){
  const cur=document.getElementById('curPw').value;
  const nw=document.getElementById('newPw').value;
  const nw2=document.getElementById('newPw2').value;
  const msg=document.getElementById('pwChangeMsg');
  if(!cur||!nw||!nw2){msg.style.color='#c0392b';msg.textContent='すべての項目を入力してください';return;}
  if(nw!==nw2){msg.style.color='#c0392b';msg.textContent='新しいパスワードが一致しません';return;}
  if(nw.length<4){msg.style.color='#c0392b';msg.textContent='パスワードは4文字以上にしてください';return;}
  // 管理者の場合
  if(AUTH.isAdmin){
    if(cur!==ADMIN_PW){msg.style.color='#c0392b';msg.textContent='現在のパスワードが正しくありません';return;}
    // 管理者PWはHTMLハードコードのため変更不可
    msg.style.color='#c0392b';msg.textContent='管理者パスワードはシステム管理者に変更を依頼してください';return;
  }
  // 一般ユーザーの場合
  const users=getUsers();
  const idx=users.findIndex(u=>u.id===AUTH.currentUser.id);
  if(idx===-1){msg.style.color='#c0392b';msg.textContent='ユーザー情報が見つかりません';return;}

  users[idx].pw=nw;
  saveUsers(users);
  document.getElementById('curPw').value='';

  document.getElementById('newPw2').value='';
  msg.style.color='#1b6b3a';msg.textContent='✓ パスワードを変更しました';
}

function applyA4Scale(pa){
  const inner=pa.querySelector('.print-doc-inner');
  if(!inner)return;
  // まずスケールをリセットして自然サイズを計測
  inner.style.transform='none';
  inner.style.width='';
  inner.style.height='';
  // A4サイズ（px換算: 96dpi基準）
  const a4w=794; // 210mm ≈ 794px
  const a4h=1123; // 297mm ≈ 1123px
  inner.style.width=a4w+'px';
  inner.style.boxSizing='border-box';
  // レイアウト確定を待って高さを計測
  const contentH=inner.scrollHeight;
  const contentW=inner.scrollWidth;
  const scaleH=a4h/contentH;
  const scaleW=a4w/contentW;
  const scale=Math.min(scaleH,scaleW); // 縦横両方収まる最大スケール
  inner.style.transform=`scale(${scale})`;
  inner.style.transformOrigin='top left';
  // スケール後の実サイズに合わせてコンテナを調整
  inner.style.width=(a4w/scale)+'px';
  pa.style.width=a4w+'px';
  pa.style.height=a4h+'px';
  pa.style.overflow='hidden';
  pa.style.position='fixed';
  pa.style.top='0';
  pa.style.left='0';
}

function resetPrintArea(pa){

// ── Code 128B バーコード生成 ──────────────────────────────
function genCode128SVG(text, opts){
  opts = opts || {};
  const barH    = opts.height   || 40;   // バー高さ(px)
  const xScale  = opts.xScale   || 1.6;  // 1モジュール幅(px) ※最小2推奨
  const showTxt = opts.showTxt  !== false;
  const fontSize= opts.fontSize || 9;

  // Code 128B シンボルテーブル (index 0〜102, 各11モジュール)
  // ※ STOP(index 106)は7要素 2331112 のため別定義
  const TABLE = [
    212222,222122,222221,121223,121322,131222,122213,122312,132212,221213,
    221312,231212,112232,122132,122231,113222,123122,123221,223211,221132,
    221231,213212,223112,312131,311222,321122,321221,312212,322112,322211,
    212123,212321,232121,111323,131123,131321,112313,132113,132311,211313,
    231113,231311,112133,112331,132131,113123,113321,133121,313121,211331,
    231131,213113,213311,213131,311123,311321,331121,312113,312311,332111,
    314111,221411,431111,111224,111422,121124,121421,141122,141221,112214,
    112412,122114,122411,142112,142211,241211,221114,413111,241112,134111,
    111242,121142,121241,114212,124112,124211,411212,421112,421211,212141,
    214121,412121,111143,111341,131141,114113,114311,411113,411311,113141,
    114131,311141,411131,211412,211214,211232
  ];
  const STOP_PAT = [2,3,3,1,1,1,2]; // STOPは7要素・13モジュール
  const START_B  = 104;              // START B のシンボル番号

  function pat6(v){ return String(v).padStart(6,'0').split('').map(Number); }

  // チェックサム: START_B + Σ(文字インデックス × 位置) mod 103
  const chars = text.split('').map(c => c.charCodeAt(0) - 32);
  let cs = START_B;
  chars.forEach((ci, i) => { cs += ci * (i + 1); });
  cs = cs % 103;

  // バー列を構築
  // 通常シンボル: 奇数インデックス=バー、偶数=スペース
  const bars = [];
  let x = 0;
  function drawPat(pat){
    pat.forEach((w, j) => {
      const px = w * xScale;
      if(j % 2 === 0) bars.push({ x, w: px }); // バー
      x += px;
    });
  }

  // START B
  drawPat(pat6(TABLE[START_B]));
  // データ文字
  chars.forEach(ci => drawPat(pat6(TABLE[ci])));
  // チェックサム
  drawPat(pat6(TABLE[cs]));
  // STOP (7要素)
  drawPat(STOP_PAT);

  // quiet zone: 左右に10モジュール分の余白を追加
  const qz    = 10 * xScale;
  const totalW = Math.ceil(x + qz * 2);
  const totalH = barH + (showTxt ? fontSize + 4 : 0);

  const rects = bars.map(b =>
    `<rect x="${(b.x + qz).toFixed(2)}" y="0" width="${b.w.toFixed(2)}" height="${barH}" fill="#000"/>`
  ).join('');
  const label = showTxt
    ? `<text x="${(totalW/2).toFixed(1)}" y="${barH + fontSize + 1}" text-anchor="middle" font-family="monospace" font-size="${fontSize}" fill="#333">${text}</text>`
    : '';

  return `<svg xmlns="http://www.w3.org/2000/svg" width="${totalW}" height="${totalH}" viewBox="0 0 ${totalW} ${totalH}" style="background:#fff">${rects}${label}</svg>`;
}

      <th style="width:36%">品名</th><th style="width:13%">規格</th><th class="right" style="width:9%">数量</th><th style="width:7%">単位</th><th class="right" style="width:13%">単価（円）</th><th class="right" style="width:16%">金額（円）</th>
    </tr></thead><tbody>
      ${e.items.filter(it=>it.name).map(it=>`<tr><td>${it.name}</td><td>${it.spec||''}</td><td class="right">${it.qty||''}</td><td>${it.unit||''}</td><td class="right">${fmt(it.price)}</td><td class="right">${fmt(it.amount)}</td></tr>`).join('')}
    </tbody></table>`;
  }

  const totalBlock=docName==='納品書'?'':`
    <div class="total-section">
      <div class="total-inner">
        <div class="total-grid">
          <div class="tk">小計</div><div class="tv">¥ ${fmt(sub)}</div>
          <div class="tk">消費税（10%）</div><div class="tv">¥ ${fmt(tax)}</div>
          <div class="grand-k">合　計</div><div class="grand-v">¥ ${fmt(grand)}</div>
        </div>
      </div>
    </div>`;

  let kaisouSection='';
  if(isKaisou&&isEst){
    const rows=[
      {k:'１．品名',v:e.items.map(it=>it.name).filter(Boolean).join('、')},
      {k:'２．使用船舶',v:e.kaisouShip||''},
      {k:'３．海上運賃',v:[e.kaisouFare1?'①2日航程　'+fmt(e.kaisouFare1)+'円　'+(e.kaisouFareLabel1||''):'',e.kaisouFare2?'②3日航程　'+fmt(e.kaisouFare2)+'円　'+(e.kaisouFareLabel2||''):''].filter(Boolean).join('<br>')},
      {k:'４．航路',v:e.kaisouRoute||''},
      {k:'５．適用開始時期',v:nl2br(e.delivery)},
      {k:'６．付帯条件',v:nl2br(e.kaisouConditions)},
      {k:'７．支払条件',v:nl2br(e.payment)},
      {k:'８．その他',v:nl2br(e.note)},
    ].filter(r=>r.v);
    kaisouSection=`<div class="kaisou-section">
      <table style="width:100%;border-collapse:collapse;font-size:11px">
        ${rows.map(r=>`<tr>
          <td class="kaisou-key">${r.k}</td>
          <td class="kaisou-val">${r.v}</td>
        </tr>`).join('')}
      </table>
    </div>`;
  }

  // バーコード（納品書・受領書のみ）
  const barcodeBlock = (docName==='納品書'||docName==='受領書') && e.no
    ? `<div style="margin-top:14px;display:flex;flex-direction:column;align-items:flex-end;gap:3px">
        <div style="font-size:8px;color:#8a9ab5;letter-spacing:.06em;text-align:right">見積No.</div>
        ${genCode128SVG(e.no,{height:48,xScale:2.0,fontSize:9})}
      </div>`
    : '';

  return`<div class="print-doc-inner">
    <div class="doc-title-center" style="display:flex;align-items:center;justify-content:center;position:relative">
      <span>${title}</span>
      <span style="position:absolute;right:0;font-size:11px;font-weight:400;letter-spacing:normal;color:#555">No.&nbsp;<span style="color:#222;font-weight:500">${e.no}</span></span>
    </div>
    <div class="doc-party">${partyLeft}${partyRight}</div>
    ${condRows.length?`<div class="conditions-band">${condRows.map(c=>`<div class="cond-row"><span class="cond-key">${c.k}</span><span class="cond-val">${c.v}</span></div>`).join('')}</div>`:''}
    ${!isKaisou||docName!=='見積書'?`<div class="items-section"><div class="items-title">品　目　明　細</div>${itemsBlock}</div>${totalBlock}`:''}
    ${kaisouSection}
    ${e.remarks?`<div class="remarks-section">${e.remarks.replace(/\n/g,'<br>')}</div>`:''}
    ${barcodeBlock}
  </div>`;
}

function render(){
  const c=document.getElementById('main');if(!c)return;
  if(S.tab==='list')c.innerHTML=renderList();
  else if(S.tab==='new')c.innerHTML=renderNew();
  else if(S.tab==='received')c.innerHTML=renderReceived();
  else if(S.tab==='help')c.innerHTML=renderHelp();
  else if(S.tab==='admin')c.innerHTML=renderAdmin();
  else if(S.tab==='settings')c.innerHTML=renderSettings();
  else c.innerHTML=renderDocTab(S.tab);
  // 備考欄の高さをコンテンツに合わせて自動調整（入力・閲覧両モード）
  var ta=document.getElementById('remarksTA');
  if(ta){ta.style.height='auto';ta.style.height=ta.scrollHeight+'px';}
}

function updDeliveryAddr(val){
  const idx=S.selIdx!==null?S.selIdx:0;
  if(!S.estimates[idx])return;
  S.estimates[idx].deliveryAddr=val;
  sv();
  const docName=S.tab==='receipt'?'受領書':'納品書';
  const prev=document.getElementById('docPreview');
  if(prev)prev.innerHTML=buildPrintDoc(S.estimates[idx],docName,val);
}

function renderDocTab(docType){
  const names={receipt:'受領書',delivery:'納品書'};
  const name=names[docType];
  if(!S.estimates.length)return`<div class="empty"><i class="ti ti-file-off"></i>見積書を先に作成してください</div>`;
  const idx=S.selIdx!==null?S.selIdx:0;
  const e=S.estimates[idx];
  const addr=e.deliveryAddr||'';
  const list=S.estimates.map((est,i)=>`<div class="est-card${i===idx?' sel':''}" onclick="S.selIdx=${i};render()" style="display:block;margin-bottom:6px;padding:10px 12px">
    <div style="font-size:11px;color:#1a3a6b;font-weight:500">No. ${est.no}</div>
    <div style="font-size:13px;font-weight:500;margin:2px 0">${est.customer||'（未入力）'}</div>
    ${typeBadge(est.type)}
  </div>`).join('');
  const previewHTML=buildPrintDoc(e,name,addr);
  return`<div class="doc-split" style="display:grid;grid-template-columns:190px 1fr;gap:14px;align-items:start">
    <div>
      <div style="font-size:11px;font-weight:500;color:#5a6a82;margin-bottom:8px">見積を選択</div>
      <div class="doc-split-list" style="max-height:520px;overflow-y:auto">${list}</div>
    </div>
    <div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <span style="font-size:14px;font-weight:500;color:#1a3a6b">${name}　プレビュー</span>
        <button class="btn pdf" onclick="printDoc('${docType}')"><i class="ti ti-printer"></i>PDF印刷</button>
      </div>
      <div class="card" style="padding:12px 16px;margin-bottom:10px">
        <div style="font-size:11px;font-weight:500;color:#5a6a82;margin-bottom:6px;display:flex;align-items:center;gap:5px"><i class="ti ti-map-pin" style="font-size:13px"></i>お届け先住所（任意）</div>
        <textarea id="deliveryAddrInput" rows="2" placeholder="例：福岡県北九州市小倉北区○○町1-2-3" style="width:100%;padding:7px 10px;font-size:13px;border:1px solid #c8d4e0;border-radius:6px;font-family:inherit;resize:vertical;min-height:54px;color:#222" oninput="updDeliveryAddr(this.value)">${addr}</textarea>
      </div>
      <div class="pdf-preview" id="docPreview">${previewHTML}</div>
    </div>
  </div>`;
}


function renderReceivedInPlace(){
  const q=(S.searchRQ||'').trim().toLowerCase();
  const list=S.receivedEstimates;
  const filtered=list.map((r,i)=>({r,i})).filter(({r})=>{
    if(!q)return true;
    return (r.supplier||'').toLowerCase().includes(q)
      ||(r.date||'').includes(q)
      ||(r.amount||'').replace(/,/g,'').includes(q.replace(/,/g,''))
      ||(r.memo||'').toLowerCase().includes(q)
      ||(r.registrant||'').toLowerCase().includes(q)
      ||(r.type||'').toLowerCase().includes(q);
  });
  const cards=filtered.map(({r,i})=>{
    const dateStr=r.date?r.date.replace(/-/g,'/'):''
    return`
    <div class="est-card" style="cursor:default;align-items:flex-start;gap:12px">
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap">
          <span style="font-size:14px;font-weight:600;color:#1a2a44">${r.supplier||'（取引先未入力）'}</span>
          ${r.type?`<span class="badge ${r.type==='shio'?'b-shio':r.type==='nai'?'b-nai':r.type==='kaisou'?'b-kaisou':''}"><i class="ti ${r.type==='shio'?'ti-box':r.type==='nai'?'ti-building-warehouse':'ti-ship'}" style="font-size:10px"></i>${{shio:'塩（外販）',nai:'内販',kaisou:'回漕'}[r.type]||r.type}</span>`:''}
          ${r.registrant?`<span style="font-size:11px;background:#e8eef7;color:#1a3a6b;padding:2px 8px;border-radius:99px;display:inline-flex;align-items:center;gap:3px"><i class="ti ti-user" style="font-size:10px"></i>${r.registrant}</span>`:''}
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px">
          ${dateStr?`<span style="font-size:11px;color:#1a3a6b;background:#dce8f8;border:1px solid #b5cce8;padding:2px 9px;border-radius:99px;display:inline-flex;align-items:center;gap:3px;font-weight:600"><i class="ti ti-calendar-event" style="font-size:11px"></i>見積日：${dateStr}</span>`:''}
          ${r.savedAt?`<span style="font-size:11px;color:#1b6b3a;background:#d8f0e3;border:1px solid #8dd4ab;padding:2px 9px;border-radius:99px;display:inline-flex;align-items:center;gap:3px"><i class="ti ti-calendar-plus" style="font-size:11px"></i>登録：${r.savedAt}</span>`:''}
          ${r.updatedAt?`<span style="font-size:11px;color:#7a4f00;background:#fef3d0;border:1px solid #f0c84a;padding:2px 9px;border-radius:99px;display:inline-flex;align-items:center;gap:3px"><i class="ti ti-calendar-check" style="font-size:11px"></i>最終修正：${r.updatedAt}</span>`:''}
        </div>
        ${r.amount?`<div style="font-size:15px;font-weight:600;color:#1a3a6b;margin-bottom:4px">¥ ${Number(r.amount.replace(/,/g,'')||0).toLocaleString('ja-JP')}</div>`:''}
        ${r.memo?`<div style="font-size:12px;color:#666;line-height:1.6;white-space:pre-wrap;background:#f8fafd;border-left:3px solid #c8d4e8;padding:4px 10px;border-radius:0 4px 4px 0;margin-top:2px">${r.memo}</div>`:''}
      </div>
      <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end;flex-shrink:0">
        <button class="btn sm" onclick="editReceived(${i})"><i class="ti ti-edit"></i>修正</button>
        <button class="btn sm pdf" onclick="viewReceivedPDF(${i})"><i class="ti ti-eye"></i>表示</button>
        <button class="btn sm" onclick="downloadReceivedPDF(${i})"><i class="ti ti-download"></i>ダウンロード</button>
        <button class="btn sm danger" onclick="delReceived(${i})"><i class="ti ti-trash"></i></button>
      </div>
    </div>`}).join('');
  const noResult=filtered.length===0&&q
    ?`<div class="empty" style="padding:32px 20px"><i class="ti ti-search-off" style="font-size:28px;display:block;margin-bottom:8px;opacity:.3"></i>「${q}」に一致する見積書はありません</div>`
    :filtered.length===0
    ?`<div class="empty"><i class="ti ti-inbox"></i>受領した見積書がまだありません<br><small style="font-size:12px;color:#aaa;margin-top:6px;display:block">下の「＋ PDFを追加」ボタンからアップロードしてください</small></div>`
    :'';
  const panel=document.getElementById('receivedPanel');
  if(panel)panel.innerHTML=cards+noResult;
  const cnt=document.querySelector('.received-count');
  if(cnt)cnt.textContent=filtered.length+'件'+(q?'／'+list.length+'件中':'');
}

let _pendingPDFData=null;
let _pendingPDFName=null;
let _editReceivedIdx=null;

function openAddReceived(){
  _pendingPDFData=null;_pendingPDFName=null;_editReceivedIdx=null;
  const m=document.getElementById('addReceivedModal');
  if(!m)return;
  m.style.display='flex';
  document.getElementById('modalIcon').className='ti ti-file-upload';
  document.getElementById('modalTitle').textContent='受領見積書を追加';
  document.getElementById('pdfRequired').style.display='';
  document.getElementById('pdfOptional').style.display='none';
  document.getElementById('rSupplier').value='';
  document.getElementById('rDate').value=today();
  document.getElementById('rAmount').value='';
  document.getElementById('rType').value='';
  document.getElementById('rRegistrant').value='';
  document.getElementById('rMemo').value='';
  document.getElementById('dropLabel').textContent='クリックまたはドラッグ＆ドロップでPDFを選択';
  const dz=document.getElementById('dropZone');
  if(dz){dz.style.borderColor='#c8d4e0';dz.style.background='#fafbfc';}
  const fi=document.getElementById('pdfFileInput');
  if(fi)fi.value='';
}
function editReceived(i){
  const r=S.receivedEstimates[i];
  _pendingPDFData=null;_pendingPDFName=null;_editReceivedIdx=i;
  const m=document.getElementById('addReceivedModal');
  if(!m)return;
  m.style.display='flex';
  document.getElementById('modalIcon').className='ti ti-edit';
  document.getElementById('modalTitle').textContent='受領見積書を修正';
  document.getElementById('pdfRequired').style.display='none';
  document.getElementById('pdfOptional').style.display='';
  document.getElementById('rSupplier').value=r.supplier||'';  document.getElementById('rDate').value=r.date||today();
  document.getElementById('rAmount').value=r.amount||'';  document.getElementById('rType').value=r.type||'';  document.getElementById('rRegistrant').value=r.registrant||'';  document.getElementById('rMemo').value=r.memo||'';
  const lbl=document.getElementById('dropLabel');
  if(lbl)lbl.innerHTML=r.fileName?`<i class="ti ti-file-text" style="color:#1a3a6b"></i> ${r.fileName}（登録済み）`
    :'クリックまたはドラッグ＆ドロップで新しいPDFを選択';
  const dz=document.getElementById('dropZone');
  if(dz){dz.style.borderColor=r.fileName?'#1a3a6b':'#c8d4e0';dz.style.background=r.fileName?'#f0f4fc':'#fafbfc';}
  const fi=document.getElementById('pdfFileInput');
  if(fi)fi.value='';
}
function closeAddReceived(){
  const m=document.getElementById('addReceivedModal');
  if(m)m.style.display='none';
  _editReceivedIdx=null;
}
function handlePDFDrop(ev){
  ev.preventDefault();
  const dz=document.getElementById('dropZone');
  dz.style.borderColor='#c8d4e0';dz.style.background='#fafbfc';
  const file=ev.dataTransfer.files[0];
  if(file&&file.type==='application/pdf')loadPDFFile(file);
  else alert('PDFファイルを選択してください');
}
function handlePDFSelect(input){
  const file=input.files[0];
  if(file)loadPDFFile(file);
}
function loadPDFFile(file){
  const reader=new FileReader();
  reader.onload=function(e){
    _pendingPDFData=e.target.result;
    _pendingPDFName=file.name;
    const lbl=document.getElementById('dropLabel');
    if(lbl)lbl.innerHTML=`<i class="ti ti-check" style="color:#27ae60"></i> ${file.name} （${(file.size/1024).toFixed(0)} KB）`;
    const dz=document.getElementById('dropZone');
    if(dz){dz.style.borderColor='#27ae60';dz.style.background='#f0faf4';}
  };
  reader.readAsDataURL(file);
}
function saveReceived(){
  const isEdit=_editReceivedIdx!==null;
  if(!isEdit&&!_pendingPDFData){alert('PDFファイルを選択してください');return;}
  const supplier=document.getElementById('rSupplier').value.trim();
  if(!supplier){alert('取引先名を入力してください');return;}
  if(isEdit){
    const r=S.receivedEstimates[_editReceivedIdx];
    r.supplier=supplier;
    r.date=document.getElementById('rDate').value;
    r.amount=document.getElementById('rAmount').value.trim();
    r.type=document.getElementById('rType').value;
    r.registrant=document.getElementById('rRegistrant').value.trim();
    r.memo=document.getElementById('rMemo').value.trim();
    if(_pendingPDFData){r.pdfData=_pendingPDFData;r.fileName=_pendingPDFName;}
    r.updatedAt=nowJST();
  }else{
    const entry={
      supplier,
      date:document.getElementById('rDate').value,
      amount:document.getElementById('rAmount').value.trim(),
      type:document.getElementById('rType').value,
      registrant:document.getElementById('rRegistrant').value.trim(),
      memo:document.getElementById('rMemo').value.trim(),
      fileName:_pendingPDFName,
      pdfData:_pendingPDFData,
      savedAt:nowJST()
    };
    S.receivedEstimates.unshift(entry);
  }
  svR();
  closeAddReceived();
  render();
}
function delReceived(i){
  if(!confirm('削除しますか？'))return;
  S.receivedEstimates.splice(i,1);
  svR();render();
}
function viewReceivedPDF(i){
  const r=S.receivedEstimates[i];
  if(!r||!r.pdfData)return;
  const w=window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html><head><title>${r.supplier} - ${r.date}</title><style>body,html{margin:0;padding:0;height:100%;background:#555}iframe{width:100%;height:100%;border:none}</style></head><body><iframe src="${r.pdfData}"></iframe></body></html>`);
  w.document.close();
}
function downloadReceivedPDF(i){
  const r=S.receivedEstimates[i];
  if(!r||!r.pdfData)return;
  const a=document.createElement('a');
  a.href=r.pdfData;
  a.download=r.fileName||'見積書.pdf';
  a.click();
}
